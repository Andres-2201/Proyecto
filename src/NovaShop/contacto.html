<!DOCTYPE html>
<html>
    <head>
        <title>Contacto</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header class="navbar">
        <div class="logo">🛍️ NovaShop</div>
            <nav class="links">
                <a href="index.html">Inicio</a>
                <a href="productos.html">Productos</a>
                <a href="ofertas.html">Ofertas</a>
                <a href="contacto.html">Contacto</a>
                <div class="carrito-icono" id="abrirCarrito">
                    🛒 <span id="contador">0</span>
                </div>
            </nav>
        </header>   
        <main>
            <section class="contact-hero">
                <h1>Contáctanos</h1>
                <p>Estamos aquí para ayudarte en todo momento</p>
            </section>

            <section class="contact-container">
                <div class="contact-info">
                    <h2>Información</h2>
                    <p>📍 Cali, Colombia</p>
                    <p>📧 soporte@novashop.com</p>
                    <p>📞 +57 312 8897671</p>
                </div>

                <form class="contact-form">
                    <h2>Envíanos un mensaje</h2>
                    <div class="input-group">
                        <input type="text" required>
                        <label>Nombre</label>
                    </div>

                    <div class="input-group">
                        <input type="email" required>
                    <label>Correo</label>
                </div>

                <div class="input-group">
                    <textarea required></textarea>
                    <label>Mensaje</label>
                </div>
                <button type="submit">Enviar mensaje</button>
                </form>
            </section>
        </main>
        <footer>
            <p>© 2026 NovaShop</p>
            <p>Todos los derechos reservados</p>
        </footer>
        <div class="overlay" id="overlay"></div>
        <div class="carrito-modal" id="carritoModal">
            <div class="carrito-header">
                <h2>Tu carrito</h2>
                <span id="cerrarCarrito">✖</span>
            </div>
            <div id="carritoItems"></div>
            <div class="carrito-footer">
                <p>Total productos: <span id="total">0</span></p>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
