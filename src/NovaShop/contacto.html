<!DOCTYPE html>
<html>
    <head>
        <title>Contacto</title>
        <link rel="stylesheet" href="styles.css">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
    </head>
    <body>
        <header class="navbar">
            <div class="logo">🛍️ NovaShop</div>
            <nav class="links">
                <a href="index.html">Inicio</a>
                <a href="productos.html">Productos</a>
                <a href="ofertas.html">Ofertas</a>
                <a href="contacto.html">Contacto</a>
            
                <div class="carrito">
                    <div class="carrito-icono" id="abrirCarrito">
                        🛒 <span id="contador">0</span>
                    </div>
                    <div class="carrito-dropdown" id="carritoDropdown">
                        <div class="carrito-header">
                            <h3>Carrito</h3>
                            <span id="cerrarCarrito">✖</span>
                        </div>
                    
                        <div id="carritoItems"></div>
                    
                        <div class="carrito-footer">
                            <p>Total: <span id="total">$0</span></p>
                            <button class="btn-pagar">Ir a pagar</button>
                        </div>
                    </div>
                </div>
            </nav>    
        </header>
        <main>
            <section class="contact-hero">
                <h1>Contáctanos</h1>
                <p>Estamos aquí para ayudarte en todo momento</p>
            </section>

            <section class="contact-container">
                <div class="contact-info">
                    <h2>Información</h2>
                    <p>📍 Cali, Colombia</p>
                    <p>📧 soporte@novashop.com</p>
                    <p>📞 +57 312 8897671</p>
                </div>

                <form class="contact-form">
                    <h2>Envíanos un mensaje</h2>
                    <div class="input-group">
                        <input type="text" required>
                        <label>Nombre</label>
                    </div>

                    <div class="input-group">
                        <input type="email" required>
                    <label>Correo</label>
                </div>

                <div class="input-group">
                    <textarea required></textarea>
                    <label>Mensaje</label>
                </div>
                <button type="submit">Enviar mensaje</button>
                </form>
            </section>
        </main>
        <footer>
            <p>© 2026 NovaShop</p>
            <p>Todos los derechos reservados</p>
        </footer>
        <script src="script.js"></script>
    </body>
</html>
